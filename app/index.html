<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>TechEcho Pro - 智能科技资讯</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;900&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    
    :root {
      --bg: #09090b;
      --bg-secondary: #18181b;
      --bg-card: #27272a;
      --bg-elevated: #3f3f46;
      --text-primary: #fafafa;
      --text-secondary: #a1a1aa;
      --text-muted: #71717a;
      --accent: #6366f1;
      --accent-hover: #818cf8;
      --border: rgba(255,255,255,0.08);
    }
    
    /* Light theme */
    body.light-theme {
      --bg: #ffffff;
      --bg-secondary: #f4f4f5;
      --bg-card: #e4e4e7;
      --bg-elevated: #d4d4d8;
      --text-primary: #09090b;
      --text-secondary: #52525b;
      --text-muted: #71717a;
      --border: rgba(0,0,0,0.08);
    }

    html, body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      background: var(--bg);
      color: var(--text-primary);
      min-height: 100vh;
      -webkit-font-smoothing: antialiased;
      transition: background 0.3s, color 0.3s;
    }

    .header {
      position: sticky;
      top: 0;
      z-index: 100;
      padding: 12px 16px;
      background: rgba(9, 9, 11, 0.85);
      backdrop-filter: blur(12px);
      border-bottom: 1px solid var(--border);
    }
    
    body.light-theme .header { background: rgba(255, 255, 255, 0.85); }
    
    .header-content {
      max-width: 600px;
      margin: 0 auto;
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
    }
    
    .logo { display: flex; align-items: center; gap: 8px; }
    .logo-icon {
      width: 32px; height: 32px;
      background: linear-gradient(135deg, #6366f1, #8b5cf6);
      border-radius: 8px;
      display: flex; align-items: center; justify-content: center;
    }
    .logo-icon svg { width: 18px; height: 18px; color: white; }
    .logo-text { font-size: 18px; font-weight: 700; }
    .logo-text.en { font-family: 'Inter', sans-serif; letter-spacing: 1px; }
    .header-actions { display: flex; align-items: center; gap: 6px; }

    /* Language Toggle */
    .lang-toggle {
      display: flex;
      gap: 2px;
      background: var(--bg-card);
      padding: 2px;
      border-radius: 6px;
      border: 1px solid var(--border);
      position: relative;
      z-index: 10;
    }

    .lang-btn {
      padding: 4px 10px;
      border-radius: 4px;
      font-size: 11px;
      font-weight: 600;
      color: var(--text-muted);
      cursor: pointer;
      transition: all 0.2s ease;
      border: none;
      background: transparent;
      position: relative;
      z-index: 11;
    }

    .lang-btn:hover { color: var(--text-secondary); }
    .lang-btn.active { background: var(--accent); color: white; }
    .lang-btn:focus { outline: none; }
    .lang-btn:active { transform: scale(0.95); }

    /* Date Picker - Frosted Glass Window Effect */
    .date-picker-wrapper {
      position: relative;
      overflow: hidden;
      padding: 0;
      background: var(--bg);
      border-bottom: 1px solid var(--border);
      height: 48px;
    }

    .date-picker-track {
      display: flex;
      align-items: center;
      height: 100%;
      overflow-x: auto;
      scroll-snap-type: x mandatory;
      scrollbar-width: none;
      -webkit-overflow-scrolling: touch;
      padding: 0 50%;
    }
    .date-picker-track::-webkit-scrollbar { display: none; }

    /* Frosted glass overlay with center cutout */
    .date-picker-wrapper::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: linear-gradient(90deg,
        var(--bg) 0%,
        var(--bg) 25%,
        rgba(99, 102, 241, 0.05) 40%,
        rgba(99, 102, 241, 0.08) 50%,
        rgba(99, 102, 241, 0.05) 60%,
        var(--bg) 75%,
        var(--bg) 100%
      );
      z-index: 10;
      pointer-events: none;
    }

    /* Subtle center glow */
    .date-picker-wrapper::after {
      content: '';
      position: absolute;
      top: 50%;
      left: 50%;
      width: 65px;
      height: 36px;
      transform: translate(-50%, -50%);
      background: rgba(99, 102, 241, 0.08);
      border-radius: 8px;
      z-index: 11;
      pointer-events: none;
    }

    .date-item {
      flex-shrink: 0;
      scroll-snap-align: center;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 0px;
      width: 55px;
      height: 34px;
      margin: 0 4px;
      border-radius: 6px;
      background: transparent;
      border: none;
      cursor: pointer;
      transition: all 0.2s ease;
      opacity: 0.2;
    }

    .date-item.center-item {
      opacity: 1;
      transform: scale(1.2);
    }

    .date-item.center-item .date-value {
      color: var(--accent);
      font-weight: 700;
    }

    .date-item.center-item .date-label {
      color: var(--accent);
    }

    .date-label {
      font-size: 8px;
      font-weight: 500;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.2px;
    }

    .date-value {
      font-size: 14px;
      font-weight: 600;
      color: var(--text-secondary);
    }

    .date-item:not(.center-item):hover {
      opacity: 0.35;
    }

    /* Category pills */
    .category-scroll {
      display: flex;
      gap: 6px;
      overflow-x: auto;
      scrollbar-width: none;
      padding: 8px 16px;
    }
    .category-scroll::-webkit-scrollbar { display: none; }
    
    .category-chip {
      flex-shrink: 0;
      display: flex;
      align-items: center;
      gap: 4px;
      padding: 6px 12px;
      background: var(--bg-secondary);
      border: 1px solid var(--border);
      border-radius: 16px;
      color: var(--text-muted);
      font-size: 12px;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.2s ease;
    }
    
    .category-chip:hover { background: var(--bg-card); color: var(--text-secondary); }
    .category-chip.active { background: var(--accent); border-color: var(--accent); color: white; }

    /* Feed */
    .feed { max-width: 600px; margin: 0 auto; padding: 16px 16px 100px; }

    /* Card */
    .news-card {
      background: var(--bg-secondary);
      border: 1px solid var(--border);
      border-radius: 12px;
      margin-bottom: 12px;
      overflow: hidden;
      transition: border-color 0.2s ease;
    }
    .news-card:hover { border-color: var(--text-muted); cursor: pointer; }

    .card-header { padding: 14px 14px 0; display: flex; gap: 12px; }
    .card-emoji {
      width: 40px; height: 40px;
      background: var(--bg-card);
      border-radius: 10px;
      display: flex; align-items: center; justify-content: center;
      font-size: 20px;
      flex-shrink: 0;
    }
    .card-meta { flex: 1; min-width: 0; }
    .card-tags { display: flex; gap: 6px; margin-bottom: 4px; flex-wrap: wrap; }
    
    .tag {
      display: inline-flex;
      padding: 2px 6px;
      border-radius: 4px;
      font-size: 10px;
      font-weight: 600;
      text-transform: uppercase;
    }
    
    .tag-zh { background: rgba(249,115,22,0.2); color: #f97316; }
    .tag-en { background: rgba(59,130,246,0.2); color: #3b82f6; }
    .tag-cat { background: rgba(99,102,241,0.2); color: #a5b4fc; }
    
    .card-source { font-size: 12px; color: var(--text-muted); }
    .source-link { color: var(--text-muted); text-decoration: none; }
    .source-link:hover { color: var(--accent); }
    .card-body { padding: 12px 14px; }
    .card-title { font-size: 15px; font-weight: 600; line-height: 1.4; margin-bottom: 6px; }
    .card-summary {
      font-size: 13px; line-height: 1.5; color: var(--text-secondary);
      display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden;
    }
    
    .card-footer {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 10px 14px;
      background: var(--bg);
      border-top: 1px solid var(--border);
    }
    
    .card-date { font-size: 11px; color: var(--text-muted); }
    .card-actions { display: flex; gap: 6px; }
    
    .action-btn {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 4px;
      padding: 6px 10px;
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 6px;
      color: var(--text-muted);
      font-size: 11px;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.15s ease;
    }
    
    .action-btn:hover { background: var(--bg-elevated); color: var(--text-secondary); }
    .action-btn:active { transform: scale(0.96); }
    .action-btn.active { background: var(--accent); border-color: var(--accent); color: white; }

    /* Bottom Nav */
    .bottom-nav {
      position: fixed;
      bottom: 0; left: 0; right: 0;
      background: rgba(9, 9, 11, 0.95);
      backdrop-filter: blur(12px);
      border-top: 1px solid var(--border);
      padding: 6px 16px;
      padding-bottom: max(6px, env(safe-area-inset-bottom));
      z-index: 100;
    }
    body.light-theme .bottom-nav { background: rgba(255, 255, 255, 0.95); }
    
    .nav-inner { max-width: 600px; margin: 0 auto; display: flex; justify-content: space-around; }
    
    .nav-item {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 2px;
      padding: 8px 16px;
      border-radius: 10px;
      background: transparent;
      border: none;
      color: var(--text-muted);
      font-size: 11px;
      cursor: pointer;
      transition: all 0.15s ease;
      min-width: 60px;
    }
    
    .nav-item:hover { background: var(--bg-card); }
    .nav-item.active { color: var(--accent); }
    .nav-icon { width: 22px; height: 22px; }

    /* Settings Page */
    .settings-page { padding: 16px; max-width: 600px; margin: 0 auto; padding-bottom: 100px; }
    .settings-section { margin-bottom: 24px; }
    .settings-title { font-size: 14px; font-weight: 600; margin-bottom: 12px; color: var(--text-muted); }
    
    .voice-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 8px;
    }
    
    .voice-option {
      padding: 12px;
      background: var(--bg-card);
      border: 2px solid var(--border);
      border-radius: 10px;
      cursor: pointer;
      transition: all 0.2s;
      text-align: center;
    }
    
    .voice-option:hover { border-color: var(--text-muted); }
    .voice-option.selected { border-color: var(--accent); background: rgba(99, 102, 241, 0.1); }
    .voice-icon { font-size: 24px; margin-bottom: 4px; }
    .voice-name { font-size: 12px; font-weight: 500; color: var(--text-primary); }
    .voice-desc { font-size: 10px; color: var(--text-muted); }
    
    .slider-container {
      display: flex;
      align-items: center;
      gap: 12px;
    }
    
    .slider {
      flex: 1;
      -webkit-appearance: none;
      height: 6px;
      background: var(--bg-card);
      border-radius: 3px;
      outline: none;
    }
    
    .slider::-webkit-slider-thumb {
      -webkit-appearance: none;
      width: 20px;
      height: 20px;
      background: var(--accent);
      border-radius: 50%;
      cursor: pointer;
    }
    
    .slider-value { font-size: 14px; font-weight: 600; color: var(--accent); min-width: 40px; text-align: center; }
    
    .toggle-container {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 12px;
      background: var(--bg-card);
      border-radius: 10px;
    }
    
    .toggle-label { font-size: 14px; font-weight: 500; }
    
    .toggle {
      width: 50px;
      height: 26px;
      background: var(--bg-elevated);
      border-radius: 13px;
      position: relative;
      cursor: pointer;
      transition: background 0.3s;
    }
    
    .toggle.active { background: var(--accent); }
    
    .toggle::after {
      content: '';
      position: absolute;
      width: 22px;
      height: 22px;
      background: white;
      border-radius: 50%;
      top: 2px;
      left: 2px;
      transition: transform 0.3s;
    }
    
    .toggle.active::after { transform: translateX(24px); }

    /* Loading */
    .loading {
      display: flex; flex-direction: column; align-items: center;
      justify-content: center; padding: 60px 20px; gap: 12px; color: var(--text-muted);
    }
    .loading-spinner {
      width: 24px; height: 24px;
      border: 2px solid var(--border);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* Toast */
    .toast {
      position: fixed;
      top: 70px; left: 50%;
      transform: translateX(-50%) translateY(-10px);
      background: var(--bg-card);
      border: 1px solid var(--border);
      padding: 10px 20px;
      border-radius: 8px;
      font-size: 13px;
      color: var(--text-primary);
      z-index: 200;
      opacity: 0;
      pointer-events: none;
      transition: all 0.2s ease;
    }
    .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

    /* Modal */
    .modal {
      display: none;
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      z-index: 1000;
      background: rgba(0,0,0,0.6);
      align-items: flex-end;
      justify-content: center;
    }
    .modal.show { display: flex; }
    .modal-content {
      width: 100%;
      max-width: 600px;
      max-height: 85vh;
      background: var(--bg-secondary);
      border-radius: 16px 16px 0 0;
      overflow: hidden;
      animation: slideUp 0.3s ease;
    }
    @keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }
    .modal-header {
      display: flex; justify-content: space-between; align-items: center;
      padding: 16px 20px;
      border-bottom: 1px solid var(--border);
    }
    .modal-title { font-size: 16px; font-weight: 600; }
    .modal-close {
      width: 32px; height: 32px;
      display: flex; align-items: center; justify-content: center;
      background: var(--bg-card);
      border: none;
      border-radius: 8px;
      color: var(--text-muted);
      cursor: pointer;
    }
    .modal-body {
      padding: 16px 20px;
      overflow-y: auto;
      max-height: calc(85vh - 60px);
    }
    .detail-title { font-size: 18px; font-weight: 700; line-height: 1.4; margin-bottom: 12px; color: var(--text-primary); }
    .detail-meta { font-size: 13px; color: var(--text-muted); margin-bottom: 16px; display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
    .detail-source-link { color: var(--accent); text-decoration: none; }
    .detail-source-link:hover { text-decoration: underline; }
    .detail-content { font-size: 14px; line-height: 1.8; color: var(--text-secondary); white-space: pre-wrap; }

    /* shadcn-ui style detail modal */
    .detail-modal-card {
      background: var(--bg-secondary);
      border-radius: 16px;
      overflow: hidden;
      border: 1px solid var(--border);
    }
    .detail-modal-header {
      padding: 20px;
      border-bottom: 1px solid var(--border);
      background: linear-gradient(145deg, var(--bg-secondary) 0%, rgba(99,102,241,0.03) 100%);
    }
    .detail-tags {
      display: flex;
      gap: 6px;
      margin-bottom: 12px;
    }
    .detail-tag {
      padding: 4px 10px;
      border-radius: 6px;
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
    }
    .detail-tag-cat { background: rgba(99,102,241,0.15); color: #a5b4fc; }
    .detail-tag-lang { background: rgba(249,115,22,0.15); color: #fb923c; }
    .detail-title { font-size: 20px; font-weight: 700; line-height: 1.4; margin-bottom: 12px; color: var(--text-primary); letter-spacing: -0.3px; }
    .detail-meta {
      display: flex;
      align-items: center;
      gap: 12px;
      flex-wrap: wrap;
    }
    .detail-source-badge {
      display: inline-flex;
      align-items: center;
      padding: 4px 12px;
      background: rgba(99,102,241,0.1);
      border: 1px solid rgba(99,102,241,0.2);
      border-radius: 20px;
    }
    .detail-source-name { font-size: 13px; font-weight: 600; color: #a5b4fc; }
    .detail-date { font-size: 13px; color: var(--text-muted); }

    /* Quality score section */
    .detail-quality {
      margin: 16px 20px;
      padding: 16px;
      background: var(--bg);
      border-radius: 12px;
      border: 1px solid var(--border);
    }
    .detail-quality-header {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 12px;
    }
    .detail-grade-badge {
      width: 36px;
      height: 36px;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 8px;
      font-size: 16px;
      font-weight: 800;
    }
    .detail-grade-title { font-size: 13px; color: var(--text-muted); flex: 1; }
    .detail-quality-score { font-size: 20px; font-weight: 700; color: var(--text-primary); }
    .detail-quality-unit { font-size: 11px; color: var(--text-muted); }
    .detail-bars {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }
    .detail-bar-item { display: flex; flex-direction: column; gap: 4px; }
    .detail-bar-label { display: flex; justify-content: space-between; }
    .detail-bar-key { font-size: 10px; color: var(--text-muted); text-transform: capitalize; }
    .detail-bar-val { font-size: 10px; font-weight: 600; color: var(--text-secondary); }
    .detail-bar-track { height: 3px; background: var(--bg-card); border-radius: 2px; overflow: hidden; }
    .detail-bar-fill { height: 100%; border-radius: 2px; transition: width 0.3s; }

    /* Content sections */
    .detail-modal-body {
      padding: 0;
    }
    .detail-section {
      padding: 16px 20px;
      border-top: 1px solid var(--border);
    }
    .detail-section-title {
      font-size: 13px;
      font-weight: 600;
      color: var(--text-muted);
      margin-bottom: 10px;
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .detail-summary { font-size: 14px; color: var(--text-secondary); line-height: 1.7; }
    .detail-full-content { font-size: 14px; color: var(--text-secondary); line-height: 1.8; }
    .detail-expand-btn {
      margin-top: 12px;
      padding: 10px;
      text-align: center;
      background: rgba(99,102,241,0.05);
      border: 1px solid rgba(99,102,241,0.1);
      border-radius: 8px;
      color: var(--accent);
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.15s;
    }
    .detail-expand-btn:active { background: rgba(99,102,241,0.1); }

    /* Source link section */
    .detail-source-link {
      background: rgba(99,102,241,0.05);
      border-radius: 10px;
      padding: 14px;
      margin: 0 20px 16px;
      border: 1px solid rgba(99,102,241,0.1);
    }
    .detail-source-link-label { font-size: 11px; color: var(--text-muted); margin-bottom: 6px; }
    .detail-source-link-url { font-size: 13px; color: var(--accent); word-break: break-all; line-height: 1.5; }

    /* Action bar */
    .detail-actions {
      display: flex;
      gap: 10px;
      padding: 16px 20px;
      background: var(--bg);
      border-top: 1px solid var(--border);
    }
    .detail-action-btn {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 4px;
      padding: 12px 8px;
      border-radius: 10px;
      border: 1px solid var(--border);
      background: var(--bg-secondary);
      cursor: pointer;
      transition: all 0.15s;
    }
    .detail-action-btn:active { transform: scale(0.97); }
    .detail-action-btn.primary {
      background: linear-gradient(135deg, #6366f1 0%, #8b5cf6 100%);
      border: none;
      box-shadow: 0 4px 12px rgba(99,102,241,0.3);
    }
    .detail-action-icon { font-size: 18px; }
    .detail-action-text { font-size: 11px; font-weight: 500; }
    .detail-action-btn.primary .detail-action-text { color: white; }
    .detail-action-btn:not(.primary) .detail-action-text { color: var(--text-secondary); }

    .empty-state {
      display: flex; flex-direction: column; align-items: center;
      justify-content: center; padding: 60px 20px; text-align: center;
    }
    .empty-icon { font-size: 48px; margin-bottom: 12px; opacity: 0.5; }
    .empty-title { font-size: 16px; font-weight: 600; margin-bottom: 4px; }
    .empty-text { font-size: 13px; color: var(--text-muted); }

    /* Stats */
    .stats-bar {
      display: flex;
      gap: 8px;
      padding: 8px 16px;
      font-size: 11px;
      color: var(--text-muted);
    }
    .stats-bar strong { color: var(--text-secondary); }

    /* AI Analysis Section */
    .ai-analysis-btn {
      display: block;
      width: calc(100% - 32px);
      margin: 0 16px 16px;
      padding: 14px 24px;
      background: linear-gradient(135deg, #6366f1 0%, #818cf8 100%);
      border: none;
      border-radius: 25px;
      color: white;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      box-shadow: 0 4px 15px rgba(99, 102, 241, 0.3);
      transition: all 0.3s;
    }
    .ai-analysis-btn:hover {
      transform: translateY(-2px);

      border-radius: 50%;
      animation: spin 0.8s linear infinite;

    @keyframes spin { to { transform: rotate(360deg); } }

    /* Analysis Result Section */
    .analysis-section { margin: 0 16px 16px; }

    /* Core Finding */
    .core-finding {
      background: linear-gradient(135deg, #1e1b4b 0%, #312e81 100%);

      padding: 20px;
      margin-bottom: 12px;

      content: '"';

      top: 5px;
      left: 15px;
      font-size: 40px;
      color: rgba(99, 102, 241, 0.3);
      font-family: Georgia, serif;

    .core-finding::after {
      content: '"';

      bottom: 5px;
      right: 15px;
      font-size: 40px;
      color: rgba(99, 102, 241, 0.3);

    .core-finding-text {
      font-size: 17px;
      font-weight: 700;
      line-height: 1.5;
      color: #fff;
    }

    /* Analysis Card */
    .analysis-card {
      background: #18181b;
      border-radius: 12px;
      padding: 16px;
      margin-bottom: 10px;
      position: relative;
      overflow: hidden;
    }
    .analysis-card::before {
      content: '';
      position: absolute;
      left: 0;
      top: 0;
      bottom: 0;
      width: 3px;
    }
    .analysis-card.status::before { background: linear-gradient(180deg, #10b981, #059669); }
    .analysis-card.trend::before { background: linear-gradient(180deg, #f59e0b, #d97706); }
    .analysis-card.problem::before { background: linear-gradient(180deg, #ef4444, #dc2626); }
    .analysis-card-header { display: flex; align-items: center; gap: 8px; margin-bottom: 10px; }
    .analysis-card-tag {
      font-size: 9px;

    .analysis-card.trend .analysis-card-tag { background: rgba(245, 158, 11, 0.2); color: #f59e0b; }

    .analysis-card-content { font-size: 13px; line-height: 1.7; color: #a1a1aa; }

    function t(key) {
      return (i18n[currentLang] && i18n[currentLang][key]) ? i18n[currentLang][key] : i18n.zh[key];
    }

    // Date options - center-aligned scroll picker
    var dateOptions = [];

    function generateDateOptions() {
      var options = [];
      var today = new Date();

      // Left side: 6 days ago down to yesterday
      for (var i = 6; i >= 2; i--) {
        var d = new Date(today);
        d.setDate(d.getDate() - i);
        options.push({
          filter: 'day' + i,
          dayLabel: '',
          value: d.getDate(),
          month: d.getMonth() + 1
        });
      }

      // Yesterday
      var yesterday = new Date(today);
      yesterday.setDate(yesterday.getDate() - 1);
      options.push({
        filter: 'yesterday',
        dayLabel: t('dateYesterday'),
        value: yesterday.getDate(),
        month: yesterday.getMonth() + 1
      });

      // Today - center position
      options.push({
        filter: 'today',
        dayLabel: t('dateToday'),
        value: today.getDate(),
        month: today.getMonth() + 1
      });

      // This Week
      options.push({
        filter: 'week',
        dayLabel: t('dateWeek'),
        value: '7',
        month: null
      });

      // This Month
      options.push({
        filter: 'month',
        dayLabel: t('dateMonth'),
        value: today.getDate(),
        month: today.getMonth() + 1
      });

      // All
      options.push({
        filter: 'all',
        dayLabel: t('dateAll'),
        value: '∞',
        month: null
      });

      return options;
    }

    function renderDatePicker() {
      var options = generateDateOptions();
      var html = '';

      for (var i = 0; i < options.length; i++) {
        var opt = options[i];
        var isActive = currentDateFilter === opt.filter;
        html += '<div class="date-item' + (isActive ? ' center-item' : '') + '" data-filter="' + opt.filter + '">' +
          (opt.dayLabel ? '<span class="date-label">' + opt.dayLabel + '</span>' : '') +
          '<span class="date-value">' + opt.value + '</span>' +
        '</div>';
      }

      document.getElementById('datePicker').innerHTML = html;

      // Add click handlers
      var items = document.querySelectorAll('.date-item');
      for (var j = 0; j < items.length; j++) {
        items[j].onclick = (function(item) {
          return function() {
            setDateFilter(item.dataset.filter);
            item.scrollIntoView({ behavior: 'smooth', inline: 'center', block: 'nearest' });
          };
        })(items[j]);
      }

      // Add scroll listener for center detection
      var track = document.getElementById('datePicker');
      track.onscroll = onDatePickerScroll;
    }

    function scrollDatePickerToCenter() {
      setTimeout(function() {
        var items = document.querySelectorAll('.date-item');
        var targetItem = null;
        for (var i = 0; i < items.length; i++) {
          if (items[i].dataset.filter === currentDateFilter) {
            targetItem = items[i];
            break;
          }
        }
        if (targetItem) {
          for (var j = 0; j < items.length; j++) {
            items[j].classList.remove('center-item');
          }
          targetItem.classList.add('center-item');
          // Scroll to center
          targetItem.scrollIntoView({ behavior: 'instant', inline: 'center', block: 'nearest' });
          // Adjust scroll position to truly center
          var track = document.getElementById('datePicker');
          var itemRect = targetItem.getBoundingClientRect();
          var trackRect = track.getBoundingClientRect();
          var centerOffset = itemRect.left - trackRect.left - (trackRect.width / 2) + (itemRect.width / 2);
          track.scrollLeft = track.scrollLeft + centerOffset;
        }
      }, 50);
    }

    var scrollTimeout = null;
    function onDatePickerScroll() {
      if (scrollTimeout) clearTimeout(scrollTimeout);
      scrollTimeout = setTimeout(function() {
        updateCenterItem();
      }, 50);
    }

    function updateCenterItem() {
      var track = document.getElementById('datePicker');
      var items = document.querySelectorAll('.date-item');
      if (!track || items.length === 0) return;

      var trackRect = track.getBoundingClientRect();
      var centerX = trackRect.left + trackRect.width / 2;

      var closestItem = null;
      var closestDist = Infinity;

      for (var i = 0; i < items.length; i++) {
        var item = items[i];
        var itemRect = item.getBoundingClientRect();
        var itemCenterX = itemRect.left + itemRect.width / 2;
        var dist = Math.abs(centerX - itemCenterX);

        if (dist < closestDist) {
          closestDist = dist;
          closestItem = item;
        }

        item.classList.remove('center-item');
      }

      if (closestItem) {
        closestItem.classList.add('center-item');
        var newFilter = closestItem.dataset.filter;
        if (newFilter !== currentDateFilter) {
          currentDateFilter = newFilter;
          filterAndRender();
        }
      }
    }

    function getTodayStr() {
      var d = new Date();
      return d.getFullYear() + '-' + String(d.getMonth() + 1).padStart(2, '0') + '-' + String(d.getDate()).padStart(2, '0');
    }

    function getDateStrDaysAgo(days) {
      var d = new Date();
      d.setDate(d.getDate() - days);
      return d.getFullYear() + '-' + String(d.getMonth() + 1).padStart(2, '0') + '-' + String(d.getDate()).padStart(2, '0');
    }

    function parseDate(dateStr) {
      // Handle formats like "Mon, 27 Apr 2026 15:58:31 +0800" or "2026-04-28" or "2026-04-28 20:44:39 +0800"
      if (!dateStr) return null;

      // If first part is a date (YYYY-MM-DD), use it directly
      if (dateStr.substring(0, 10).match(/^\d{4}-\d{2}-\d{2}$/)) {
        return dateStr.substring(0, 10);
      }

      var parts = dateStr.split(' ');
      if (parts.length >= 3) {
        // "Mon, 27 Apr 2026" format
        var day = parts[1];
        var monthMap = { Jan: '01', Feb: '02', Mar: '03', Apr: '04', May: '05', Jun: '06', Jul: '07', Aug: '08', Sep: '09', Oct: '10', Nov: '11', Dec: '12' };
        var month = monthMap[parts[2]] || '01';
        var year = parts[3];
        return year + '-' + month + '-' + day.padStart(2, '0');
      } else if (parts.length === 1 && dateStr.includes('-')) {
        // "2026-04-28" format
        return dateStr.substring(0, 10);
      }
      return null;
    }

    function isInDateRange(dateStr) {
      if (currentDateFilter === 'all') return true;

      var datePart = parseDate(dateStr);
      if (!datePart) return true;

      var today = getTodayStr();
      var yesterday = getDateStrDaysAgo(1);
      var monthStart = today.substring(0, 7) + '-01';

      if (currentDateFilter === 'today') {
        // First check if there are today's news
        var hasTodayNews = allNews.some(function(item) {
          var itemDate = parseDate(item.published_at || item.created_at || '');
          return itemDate === today;
        });
        // If no today's news, show yesterday's news instead
        if (!hasTodayNews) {
          return datePart === yesterday;
        }
        return datePart === today;
      }
      if (currentDateFilter === 'yesterday') {
        return datePart === yesterday;
      }
      if (currentDateFilter === 'week') {
        var weekAgo = getDateStrDaysAgo(7);
        return datePart >= weekAgo && datePart <= today;
      }
      if (currentDateFilter === 'month') {
        return datePart >= monthStart && datePart <= today;
      }
      // For 'day2' to 'day6', check specific date
      if (currentDateFilter.startsWith('day')) {
        var daysAgo = parseInt(currentDateFilter.substring(3));
        return datePart === getDateStrDaysAgo(daysAgo);
      }
      return true;
    }

        var dateStr = item.published_at || item.created_at || '';

        filteredNews.push(item);

    async function handleSpeak(id) {
      if (playingId === id) {
        // Stop playing
        if (currentAudio) {
          currentAudio.pause();
          currentAudio = null;
        }
        playingId = null;
        render();
        showToast(t('stopped'));
      } else {
        var item = allNews.find(function(n) { return n.id === id; });
        if (!item) return;

        showToast(t('speaking'));

        // Check if we have pre-generated audio
        var audioUrls = item.audio || {};
        var audioUrl = audioUrls[settings.voice];

        if (audioUrl) {
          // 有预生成 → 调 /api/news/{id}/read 获取云存储临时 URL
          try {
            var readResp = await fetch('/api/news/' + id + '/read', { method: 'PUT' });
            var readResult = await readResp.json();
            if (readResult.success && readResult.audio_url) {
              playAudio(id, readResult.audio_url);
            } else {
              showToast(t('speechFailed'));
            }
          } catch (e) {
            console.error('Read audio error:', e);
            showToast(t('speechFailed'));
          }
        } else {
          // 无预生成 → 调 /api/favorites/tts 获取 MiniMax OSS URL
          var text = currentLang === 'en' ? (item.content_en || item.title_en) : (item.content_zh || item.title_zh);
          try {
            var ttsResp = await fetch('/api/favorites/tts', {
              method: 'POST',
              headers: { 'Content-Type': 'application/json' },
              body: JSON.stringify({ text: text.slice(0, 500) })
            });
            var ttsResult = await ttsResp.json();
            if (ttsResult.success && ttsResult.data && ttsResult.data.audio_url) {
              playAudio(id, ttsResult.data.audio_url);
            } else {
              showToast(t('speechFailed'));
            }
          } catch (e) {
            console.error('TTS error:', e);
            showToast(t('speechFailed'));
          }
        }
      }
    }

    function playAudio(id, url) {
      if (currentAudio) {
        currentAudio.pause();
      }

      currentAudio = new Audio(url);
      currentAudio.play();

      playingId = id;
      render();

      currentAudio.onended = function() {
        playingId = null;
        currentAudio = null;
        render();
      };

      currentAudio.onerror = function() {
        playingId = null;
        currentAudio = null;
        render();
        showToast(t('speechFailed'));
      };
    }

    function playBrowserTTS(id, item) {
      var text = currentLang === 'en' ? (item.content_en || item.title_en) : (item.content_zh || item.title_zh);
      var lang = currentLang === 'en' ? 'en-US' : 'zh-CN';

      if ('speechSynthesis' in window) {
        speechSynthesis.cancel();

        var utterance = new SpeechSynthesisUtterance(text.slice(0, 500));
        utterance.lang = lang;
        utterance.rate = 1.0;
        utterance.pitch = 1.0;
        utterance.volume = 1.0;

        // Get available voices
        var availableVoices = speechSynthesis.getVoices();

        // Voice selection based on settings
        var selectedVoice = null;
        var currentVoiceSetting = settings.voice || 'voice1';

        // Map voice settings to search patterns (broader matching)
        var voicePatterns = {
          'voice1': ['david', 'male', 'zh-CN', 'chinese', 'deep'],
          'voice2': ['mark', 'male', 'young', 'energy'],
          'voice3': ['zira', 'female', 'jenny', 'susan'],
          'voice4': ['hazel', 'female', 'aria', 'professional']
        };

        var patterns = voicePatterns[currentVoiceSetting] || voicePatterns['voice1'];

        // Try to find a matching voice
        for (var i = 0; i < availableVoices.length; i++) {
          var voice = availableVoices[i];
          var voiceNameLower = voice.name.toLowerCase();
          var voiceLang = voice.lang.toLowerCase();

          // Match language first
          if (lang === 'zh-CN' && (voiceLang.includes('zh') || voiceLang.includes('chinese'))) {
            for (var p = 0; p < patterns.length; p++) {
              if (voiceNameLower.includes(patterns[p])) {
                selectedVoice = voice;
                break;
              }
            }
          } else if (lang === 'en-US' && (voiceLang.includes('en') || voiceLang.includes('english'))) {
            for (var p = 0; p < patterns.length; p++) {
              if (voiceNameLower.includes(patterns[p])) {
                selectedVoice = voice;
                break;
              }
            }
          }

          if (selectedVoice) break;
        }

        // Fallback: just match language
        if (!selectedVoice) {
          for (var i = 0; i < availableVoices.length; i++) {
            var voice = availableVoices[i];
            var voiceLang = voice.lang.toLowerCase();
            if (lang === 'zh-CN' && (voiceLang.includes('zh') || voiceLang.includes('chinese'))) {
              selectedVoice = voice;
              break;
            } else if (lang === 'en-US' && (voiceLang.includes('en'))) {
              selectedVoice = voice;
              break;
            }
          }
        }

        if (selectedVoice) {
          utterance.voice = selectedVoice;
          console.log('Using voice:', selectedVoice.name);
        } else {
          console.log('No matching voice found, using default');
        }

        utterance.onstart = function() {
          playingId = id;
          render();
        };

        utterance.onend = function() {
          playingId = null;
          render();
        };

        utterance.onerror = function() {
          playingId = null;
          render();
          showToast(t('speechFailed'));
        };

        speechSynthesis.speak(utterance);
      } else {
        showToast(t('noSupport'));
      }
    }

            '<div class="final-thought-label">主笔手记</div>' +
            '<div class="final-thought-text">' + analysis.final_thought + '</div>' +
          '</div>';
        }

        resultDiv.innerHTML = html;

        // 调用 TTS
        if (rawText) {
          showToast('正在生成语音...');
          var ttsResponse = await fetch('/api/favorites/tts', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ text: rawText })
          });
          var ttsResult = await ttsResponse.json();

          if (ttsResult.success && ttsResult.data && ttsResult.data.audio_url) {
            currentAudioUrl = ttsResult.data.audio_url;
            var duration = ttsResult.data.duration || 300;
            initAudioPlayer(currentAudioUrl, duration);
            playerDiv.style.display = 'block';
            showToast('语音已生成，点击播放');
          }
        }

      } catch (error) {
        console.error('Analysis error:', error);
        resultDiv.innerHTML = '<div style="text-align:center;padding:20px;color:#ef4444;">分析失败: ' + error.message + '</div>';
        showToast('网络异常，请重试');
      } finally {
        btn.disabled = false;
        btn.classList.remove('loading');
        btn.innerHTML = '<span class="btn-icon">🎙️</span><span>重新分析</span><span class="spinner"></span>';
      }
    }

    function initAudioPlayer(url, duration) {
      if (analysisAudio) {
        analysisAudio.pause();
        analysisAudio = null;
      }
      analysisAudio = new Audio(url);
      analysisAudio.playbackRate = 1.15;

      analysisAudio.addEventListener('loadedmetadata', function() {
        document.getElementById('playerTotalTime').textContent = formatTime(analysisAudio.duration);
        document.getElementById('playerDuration').textContent = '0:00 / ' + formatTime(analysisAudio.duration);
      });

      analysisAudio.addEventListener('timeupdate', function() {
        var current = analysisAudio.currentTime;
        var total = analysisAudio.duration || duration;
        var percent = (current / total) * 100;
        document.getElementById('playerProgressFill').style.width = percent + '%';
        document.getElementById('playerCurrentTime').textContent = formatTime(current);
        document.getElementById('playerDuration').textContent = formatTime(current) + ' / ' + formatTime(total);
      });

      analysisAudio.addEventListener('ended', function() {
        document.getElementById('playBtn').textContent = '▶';
      });

      // 自动播放
      analysisAudio.play().then(function() {
        document.getElementById('playBtn').textContent = '⏸';
      }).catch(function(e) {
        console.log('Auto play blocked:', e);
      });
    }

    function togglePlay() {
      if (!analysisAudio) return;
      if (analysisAudio.paused) {
        analysisAudio.play();
        document.getElementById('playBtn').textContent = '⏸';
      } else {
        analysisAudio.pause();
        document.getElementById('playBtn').textContent = '▶';
      }
    }

    function playerSkip(seconds) {
      if (!analysisAudio) return;
      analysisAudio.currentTime = Math.max(0, analysisAudio.currentTime + seconds);
    }

    function seekPlayer(event) {
      if (!analysisAudio) return;
      var rect = event.currentTarget.getBoundingClientRect();
      var percent = (event.clientX - rect.left) / rect.width;
      analysisAudio.currentTime = percent * analysisAudio.duration;
    }

    function setSpeed(speed) {
      if (analysisAudio) {
        analysisAudio.playbackRate = speed;
      }
      // 更新按钮状态
      var speedBtns = document.querySelectorAll('.speed-btn');
      for (var i = 0; i < speedBtns.length; i++) {
        speedBtns[i].classList.remove('active');
        if (speedBtns[i].textContent === speed + 'x') {
          speedBtns[i].classList.add('active');
        }
      }
    }

    function downloadAudio() {
      if (currentAudioUrl) {
        var a = document.createElement('a');
        a.href = currentAudioUrl;
        a.download = 'techecho-analysis.mp3';
        a.click();
      }
    }

    function formatTime(seconds) {
      if (!seconds || isNaN(seconds)) return '0:00';
      var m = Math.floor(seconds / 60);
      var s = Math.floor(seconds % 60);
      return m + ':' + (s < 10 ? '0' : '') + s;
    }

    function refreshNews() {
      showToast(t('refreshing'));
      loadNews();
    }

    function showToast(msg) {
      var toast = document.getElementById('toast');
      toast.textContent = msg;
      toast.classList.add('show');
      setTimeout(function() { toast.classList.remove('show'); }, 2000);
    }

    function loadNews() {
      var loadingEl = document.getElementById('loadingText');
      if (loadingEl) loadingEl.textContent = t('loading');
      fetch('./data/news.json')
        .then(function(r) { return r.json(); })
        .then(function(d) {
          allNews = d.news || [];
          filterAndRender();
        })
        .catch(function(e) {
          console.error('Error:', e);
          var feed = document.getElementById('feed');
          if (feed) {
            feed.innerHTML = '<div class="empty-state"><div class="empty-icon">⚠️</div><div class="empty-title">' + t('emptyTitle') + '</div><div class="empty-text">' + t('emptyText') + '</div></div>';
          }
        });
    }

    document.getElementById('detailModal').onclick = function(e) {
      if (e.target === this) closeDetail();
    };

    init();
  </script>
</body>
</html>
